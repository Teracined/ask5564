<title>5564 群聊人物语气模拟器</title>
<style>

*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:radial-gradient(circle at top left,rgba(255,122,89,.18),transparent 34%),radial-gradient(circle at 80% 10%,rgba(123,97,255,.15),transparent 30%),var(--bg);color:var(--ink)}
button,input,textarea{font:inherit}.wrap{max-width:1220px;margin:0 auto;padding:26px}.hero{display:grid;grid-template-columns:1.1fr .9fr;gap:22px;align-items:stretch}.panel{background:rgba(255,250,242,.82);background:color-mix(in srgb,var(--card) 90%,transparent);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:28px;padding:24px;backdrop-filter:blur(18px)}

:center;margin-bottom:12px}.person-top h3{margin:0;font-size:20px}.tag{color:var(--muted);font-size:13px;margin-top:4px}.pillbox{display:flex;flex-wrap:wrap;gap:7px;margin:12px 0}.pill{font-size:12px;padding:6px 9px;border-radius:999px;background:color-mix(in srgb,var(--accent) 12%,transparent);border:1px solid var(--line)}.mini{font-size:13px;color:var(--muted);line-height:1.7}.details{margin-top:12px;border-top:1px dashed var(--line);padding-top:12px}.details li{margin:6px 0;color:var(--muted);line-height:1.55}.chat-layout{display:grid;grid-template-columns:320px 1fr;gap:18px}.side-list{display:flex;flex-direction:column;gap:10px}.person-btn{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:18px;cursor:pointer;text-align:left}.person-btn.active{outline:2px solid var(--accent);background:color-mix(in srgb,var(--accent) 10%,var(--card))}.chatbox{min-height:610px;display:flex;flex-direction:column}.chat-head{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding-bottom:12px}.messages{flex:1;overflow:auto;padding:16px 4px;display:flex;flex-direction:column;gap:12px}.msg{max-width:78%;padding:12px 14px;border-radius:18px;line-height:1.6;box-shadow:0 6px 16px rgba(0,0,0,.04)}.msg.user{align-self:flex-end;background:linear-gradient(135deg,var(--accent),#ffb36e);color:#2a130d;border-bottom-right-radius:4px}.msg.bot{align-self:flex-start;background:var(--bubble);border:1px solid var(--line);border-bottom-left-radius:4px}.chat-input{display:flex;gap:10px;border-top:1px solid var(--line);padding-top:14px}.chat-input input{flex:1;border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:16px;padding:13px}.chips{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 2px}.chip{border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:999px;padding:6px 10px;cursor:pointer;font-size:12px}.compare{display:grid;grid-template-columns:1fr 1fr;gap:14px}.meter{height:10px;border-radius:99px;background:color-mix(in srgb,var(--line) 70%,transparent);overflow:hidden}.meter i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:inherit}.footer{color:var(--muted);text-align:center;margin:30px 0 10px;font-size:13px}@media(max-width:900px){.hero,.chat-layout{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.compare{grid-template-columns:1fr}.wrap{padding:16px}.panel{border-radius:22px}}

<body data-theme="light">
<div class="wrap">
  <div class="hero">
    <section class="panel">
      <div class="kicker">🌧️ 5564 群聊语气工程</div>
      <h1>群聊人物<br>对话模拟器</h1>
      <p class="lead">提取群聊中不同成员的语气、聊天方式、高频词和互动习惯，做成一个可以切换人物并进行模拟对话的页面。</p>
      <div class="actions">
        <button class="btn accent" onclick="switchTab('chat')">开始对话</button>
        <button class="btn ghost" onclick="switchTab('people')">查看人物画像</button>
        <button class="btn ghost" onclick="toggleTheme()">切换夜间模式</button>
      </div>
    </section>
    <section class="panel">
      <div class="statgrid">
        <div class="stat"><b>33,116</b><span>总消息记录</span></div>
        <div class="stat"><b>7</b><span>主要可模拟人物</span></div>
        <div class="stat"><b>2025</b><span>聊天记录起始年份</span></div>
        <div class="stat"><b>AI</b><span>风格模拟与角色切换</span></div>
      </div>
      <p class="mini" style="margin-top:16px">说明：本页面只根据上传记录做“语言风格模拟”，不代表任何成员真实观点，也不会声称是本人。</p>
    </section>
  </div>

  <div class="tabs"><div class="tabbar">
    <button class="tab active" data-tab="people" onclick="switchTab('people')">人物画像</button>
    <button class="tab" data-tab="chat" onclick="switchTab('chat')">对话模拟</button>
    <button class="tab" data-tab="lexicon" onclick="switchTab('lexicon')">语气词库</button>
    <button class="tab" data-tab="compare" onclick="switchTab('compare')">风格对比</button>
  </div></div>

  <section id="people" class="section active"><div class="grid" id="peopleGrid"></div></section>

  <section id="chat" class="section">
    <div class="chat-layout">
      <aside class="side-list" id="personList"></aside>
      <main class="panel chatbox">
        <div class="chat-head"><div><b id="chatName">Carleos</b><div class="mini" id="chatTag">短句吐槽型</div></div><button class="btn ghost" onclick="clearChat()">清空</button></div>
        <div class="chips">
          <button class="chip" onclick="quick('今晚几点上战场')">今晚几点上战场</button>
          <button class="chip" onclick="quick('这个策划案怎么样')">这个策划案怎么样</button>
          <button class="chip" onclick="quick('我好像要完蛋了')">我好像要完蛋了</button>
          <button class="chip" onclick="quick('帮我接一句群聊梗')">帮我接一句群聊梗</button>
        </div>
        <div class="messages" id="messages"></div>
        <div class="chat-input"><input id="input" placeholder="输入一句话，看看这个人物会怎么回……" onkeydown="if(event.key==='Enter')sendMsg()"><button class="btn accent" onclick="sendMsg()">发送</button></div>
      </main>
    </div>
  </section>

  <section id="lexicon" class="section"><div class="grid" id="lexiconGrid"></div></section>

  <section id="compare" class="section">
    <div class="panel"><h2>风格对比雷达</h2><p class="mini">根据发言长度、标点、表情包比例、短句倾向和角色扮演感做的页面内简化展示。</p><div class="compare" id="compareGrid"></div></div>
  </section>
  <div class="footer">Generated from uploaded group-chat export · 5564 Persona Chat Page</div>
</div>

let current = personas[0];
function $(id){return document.getElementById(id)}
function switchTab(id){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===id));window.scrollTo({top:0,behavior:'smooth'})}
function toggleTheme(){document.body.dataset.theme=document.body.dataset.theme==='dark'?'light':'dark'}
function renderPeople(){
 $('peopleGrid').innerHTML=personas.map(p=>`<article class="card"><div class="person-top"><div class="avatar">${p.avatar}</div><div><h3>${p.name}</h3><div class="tag">${p.tag}</div></div></div><p class="mini">${p.style}</p><div class="pillbox">${p.phrases.slice(0,6).map(x=>`<span class="pill">${x}</span>`).join('')}</div><div class="details"><b>聊天方式</b><ul>${p.tone.map(x=>`<li>${x}</li>`).join('')}</ul></div><button class="btn ghost" onclick="selectPersona('${p.id}');switchTab('chat')">和 TA 对话</button></article>`).join('')
 $('personList').innerHTML=personas.map(p=>`<button class="person-btn ${p.id===current.id?'active':''}" onclick="selectPersona('${p.id}')"><div class="avatar">${p.avatar}</div><div><b>${p.name}</b><div class="mini">${p.tag}</div></div></button>`).join('')
 $('lexiconGrid').innerHTML=personas.map(p=>`<article class="card"><h3>${p.name}</h3><div class="pillbox">${p.phrases.map(x=>`<span class="pill">${x}</span>`).join('')}</div><div class="details"><b>样例句</b><ul>${p.examples.map(x=>`<li>${x}</li>`).join('')}</ul></div></article>`).join('')
 renderCompare(); updateChatHead();
}
function renderCompare(){
 const metrics={carleos:[82,70,58,85],tsuki:[92,88,62,76],onion:[78,66,52,83],elkuai:[62,60,48,64],blank:[72,76,56,90],teracinde:[55,42,25,18],demian:[28,25,35,70]};
 const names=['情绪反应','梗密度','表情/符号','短句倾向'];
 $('compareGrid').innerHTML=personas.map(p=>`<div class="card"><div class="person-top"><div class="avatar">${p.avatar}</div><div><h3>${p.name}</h3><div class="tag">消息 ${p.count} · 文本 ${p.text} · 均长 ${p.avg}</div></div></div>${names.map((n,i)=>`<div class="mini" style="margin-top:10px">${n}</div><div class="meter"><i style="width:${metrics[p.id][i]}%"></i></div>`).join('')}</div>`).join('')
}
function selectPersona(id){current=personas.find(p=>p.id===id)||personas[0];document.querySelectorAll('.person-btn').forEach((b,i)=>b.classList.toggle('active',personas[i].id===current.id));updateChatHead();bot(`已切换到 ${current.name} 的语气。${current.replies[0]}`)}
function updateChatHead(){if(!$('chatName'))return;$('chatName').textContent=current.name;$('chatTag').textContent=current.tag}
function addMsg(text,who){const d=document.createElement('div');d.className='msg '+who;d.textContent=text;$('messages').appendChild(d);$('messages').scrollTop=$('messages').scrollHeight}
function bot(text){addMsg(text,'bot')}
function user(text){addMsg(text,'user')}
function generateReply(input){
